server:
  port: 8080
  servlet:
    session:
      timeout: 6h

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/english_app
    username: english_app
    password: english_app
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  cors:
    allowed-origin: http://localhost:5173
  # Grammar check uses local LanguageTool (no API key needed)
