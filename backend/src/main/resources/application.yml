server:
  port: 8080
  servlet:
    session:
      # Session timeout (user stays logged in). Use seconds so it's applied reliably.
      timeout: 21600  # 6 hours

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/english_app
    username: english_app
    password: english_app
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  cors:
    allowed-origin: http://localhost:5173
  # Frontend base URL for password reset links in email (no trailing slash)
  frontend-url: http://localhost:5173
  # Grammar check uses local LanguageTool (no API key needed)
